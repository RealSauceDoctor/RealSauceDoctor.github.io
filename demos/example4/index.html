<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Functionality -->
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- linked files -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="progress"></div>

    <header>
        <h1>Title</h1>
        <div class="client">Sub-title</div>
        <div class="page">1 / 2</div>
        <div class="pixels">0</div>
    </header>

    <section data-client="Alter Ego" data-page="1 / 4">
        <div class="content">
            <div class="square" data-parallax="0.1"></div>

            <img src="../example2/images/img1.jpg"
                srcset="../example2/images/img1.jpg, ../example2/images/img1-2x.jpg 2x" alt="img1">

            <div class="circle" data-parallax="-0.1"></div>
        </div>
    </section>

    <section class="s2" data-client="Valencia Clothing" data-page="2 / 4">
        <div class="content">
            <div class="square" data-parallax="0.2"></div>

            <img src="../example2/images/img2.jpg"
                srcset="../example2/images/img2.jpg, ../example2/images/img2-2x.jpg 2x" alt="img2">

            <div class="circle" data-parallax="-0.2"></div>
        </div>
    </section>

    <section class="s3" data-client="SuperHi" data-page="3 / 4" data-is-white="1">
        <div class="content">
            <div class="square" data-parallax="0.3"></div>

            <img src="../example2/images/img3.jpg"
                srcset="../example2/images/img3.jpg, ../example2/images/img3-2x.jpg 2x" alt="img3">

            <div class="circle" data-parallax="-0.3"></div>
        </div>
    </section>

    <section class="s4" data-client="10x Banking" data-page="4 / 4" data-is-white="1">
        <div class="content">
            <div class="square" data-parallax="0.4"></div>

            <img src="../example2/images/img4.jpg"
                srcset="../example2/images/img4.jpg, ../example2/images/img4-2x.jpg 2x" alt="img4">

            <div class="circle" data-parallax="-0.4"></div>
        </div>
    </section>

    <script src="js/scroll.js"></script>
</body>

</html>
