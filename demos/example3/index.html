<!DOCTYPE html>
<html>

<head>
    <!-- Functionality -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- linked files -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <section class="options">
        <h1>Type Checker</h1>
        <div class="option">
            <label for="">Your text</label>
            <input type="text" name="sentence" placeholder="The quick brown fox...">
        </div>

        <div class="option">
            <label for="">Typeface</label>
            <select name="typeface" id="">
                <option value="serif">Serif</option>
                <option value="sans-serif">Sans</option>
                <option value="monospace">Mono</option>
            </select>
        </div>

        <div class="option">
            <label for="">Type size <span class="typesize-output">64px</span></label>
            <input type="range" name="typesize" min="12" max="200" value="64">
        </div>

        <div class="option">
            <label for="">Font weight <span class="fontweight-output">400</span></label>
            <input type="range" name="fontweight" min="100" max="900" value="400" step="100">
        </div>

        <div class="option">
            <label for="">Leading <span class="lineheight-output">1.5</span></label>
            <input type="range" name="lineheight" min="0.75" max="2.5" value="1.5" step="0.25">
        </div>

        <div class="option option-checkbox">
            <label for="">Italic</label>
            <input type="checkbox" name="italic">
        </div>

        <div class="option">
            <label for="">Colors</label>
            <div class="colors">
                <div style="background-color: black; color: white;" class="selected">a</div>
                <div style="background-color: white; color: black;">a</div>
                <div style="background-color: red; color: white;">a</div>
                <div style="background-color: green; color: black;">a</div>
                <div style=" background-color: blue; color: white;">a</div>
            </div>
        </div>
    </section>

    <textarea class="output">The quick brown fox jumps over the lazy fog</textarea>

    <script src="js/typechecker.js"></script>
</body>

</html>
