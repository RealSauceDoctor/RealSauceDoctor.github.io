<!DOCTYPE html>
<html>

<head>
    <!-- Functionality -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- linked files -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <section class="options">
        <h1>Type Checker</h1>
        <div class="option">
            <label for="">Your text</label>
            <input type="text" name="sentence" placeholder="The quick brown fox...">
        </div>

        <div class="option">
            <label for="">Type size <span class="typesize-output">64px</span></label>
            <input type="range" name="typesize" min="12" max="200" value="64">
        </div>

        <div class="option">
            <label for="">Font weight <span class="fontweight">100</span></label>
            <input type="range" name="fontweight" min="100" max="900" value="500">
        </div>

        <div class="option">
            <label for="">Leading <span class="leading-output">1.75</span></label>
            <input type="range" name="leading" min="0.5" max="5" value="1.75">
        </div>
    </section>

    <textarea class="output">The quick brown fox jumps over the lazy fog</textarea>

    <script src="js/typechecker.js"></script>
</body>

</html>
