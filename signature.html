<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <title></title>

    <style media="screen">
        @import url('https://fonts.googleapis.com/css2?family=Aldrich&family=Bungee&family=Roboto+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1C1C1C;
            color: #ACACAC;
            font-family: 'Roboto Mono', monospace;
            font-size: 1em;
        }

        .container {
            width: 50%;
            min-width: 360px;
            display: grid;
            grid-gap: 0.5em;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);

            grid-template-areas: "pic info"
                "sns contact";

        }

        .container>div {
            padding: 1em;
        }

        .container .pic {
            grid-area: pic;
            height: 160px;
            width: 360px;
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            background-color: red;
        }

        .container .info {
            grid-area: info;
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            background-color: green;
        }

        .container .sns {
            grid-area: sns;
            display: flex;
            align-items: center;
            background-color: blue;
        }

        .container .contact {
            grid-area: contact;
            display: flex;
            align-items: center;
            background-color: purple;
        }

        @media only screen and (max-width:768px) {
            .container {
                grid-template-columns: repeat(1, 1fr);
                grid-template-rows: repeat(4, 1fr);
                grid-template-areas: "pic"
                    "info"
                    "sns"
                    "contact";
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="pic">
            <img src="" alt="">
        </div>
        <div class="info">
            <h1>Ivan Saucedo</h1>
            <h2>Digital Creator</h2>
            <h3>Creative/Art Director | itzcuintli & Abstract</h3>
        </div>
        <div class="sns">
            <p></p>
            <p></p>
            <p></p>
            <p></p>
        </div>
        <div class="contact">
            <p>+52 443 133 1195</p>
            <p>itzcuintlida@gmail.com</p>
            <p></p>
            <p>Morelia, Mich., Mexico.</p>
        </div>

    </div>
</body>

</html>
